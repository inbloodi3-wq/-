<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIDORA - VOID 16:00</title>
    
    <link href="https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/static/woff2/SUIT.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-warm: #F2F0ED;      
            --text-dark: #1A1A1A;    
            --text-muted: #8C8C8C;
            --accent-amber: #D9B99B;
            --font-sans: 'SUIT', -apple-system, sans-serif;
            --font-serif: 'Cormorant', serif;
            
            --typo-display-l-size: clamp(60px, 10vw, 120px);
            --typo-display-l-weight: 800;
            --typo-display-l-lh: 1.1; 
            --typo-display-l-ls: -0.02em;

            --typo-body-l-size: 16px;
            --typo-body-l-weight: 400;
            --typo-body-lh: 1.8; 
            --typo-body-ls: -0.005em;

            --section-padding: 120px 5vw;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

        body {
            background-color: var(--bg-warm);
            color: var(--text-dark);
            font-family: var(--font-sans);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* 1. Custom Cursor */
        .cursor-glow {
            position: fixed; top: 0; left: 0;
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(217, 185, 155, 0.25) 0%, transparent 60%);
            border-radius: 50%;
            pointer-events: none; transform: translate(-50%, -50%);
            z-index: 9999; transition: width 0.4s ease, height 0.4s ease;
            mix-blend-mode: multiply;
        }

        /* 2. Navigation (선명한 색상 + 스크롤 시 사라지는 메뉴) */
        nav {
            position: fixed; top: 0; left: 0; width: 100%;
            padding: 40px 5vw; display: flex;
            justify-content: space-between; align-items: flex-start;
            z-index: 1000; pointer-events: none;
        }

        .nav-logo, .nav-menu {
            pointer-events: auto;
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            color: var(--text-dark); /* 또렷한 블랙 색상 고정 */
        }

        .nav-logo { font-weight: 800; font-size: 28px; letter-spacing: 0.05em; text-transform: uppercase; }
        .nav-menu { font-weight: 500; font-size: 14px; letter-spacing: 0.08em; display: flex; align-items: center; height: 28px; }
        .nav-menu-line { display: block; width: 0; height: 2px; background-color: var(--text-dark); margin-left: 10px; transition: width 0.6s cubic-bezier(0.25, 1, 0.5, 1); }

        .scrolled .nav-logo { transform: scale(0.5); transform-origin: top left; opacity: 0.5; }
        .scrolled .nav-menu-text { opacity: 0; position: absolute; pointer-events: none; }
        .scrolled .nav-menu-line { width: 60px; margin-left: 0; }

        /* 3. Hero Section (Signature Scent Focus) */
        .hero-signature {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center; /* 중앙 정렬로 시그니처 강조 */
            padding: 120px 5vw;
            text-align: center;
        }

        /* 시그니처 이미지 (참조 이미지 무드 반영) */
        .hero-visual {
            width: clamp(280px, 30vw, 400px);
            aspect-ratio: 3/4;
            margin-bottom: 60px;
            overflow: hidden;
            background-color: #E8E6E3;
            will-change: transform, opacity, filter;
        }

        .hero-visual img {
            width: 100%; height: 100%; object-fit: cover;
            filter: sepia(0.05) contrast(1.02);
        }

        /* 제품 테마 라벨 (UNSEEN PRESENCE) */
        .hero-label {
            font-family: var(--font-sans);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent-amber);
            margin-bottom: 16px;
        }

        /* 메인 제품명 (기단 효과 레이아웃) */
        .hero-title {
            font-size: var(--typo-display-l-size);
            font-weight: var(--typo-display-l-weight);
            line-height: 1.0;
            letter-spacing: var(--typo-display-l-ls);
            text-transform: uppercase;
        }

        .hero-title span.line-1 { display: block; font-size: 0.6em; margin-bottom: 5px; } /* 위는 짧고 */
        .hero-title span.line-2 { display: block; } /* 아래는 길게 */

        .hero-desc {
            font-size: var(--typo-body-l-size);
            font-weight: var(--typo-body-l-weight);
            line-height: var(--typo-body-lh);
            margin-top: 40px;
            max-width: 500px;
            color: var(--text-dark);
            word-break: keep-all;
        }

        /* 4. Product Info Section (초기 4단 구조 복구) */
        .section-minimal {
            padding: var(--section-padding);
            display: grid;
            grid-template-columns: 4fr 5fr;
            gap: var(--grid-gap);
            align-items: center;
        }

        .image-wrapper { width: 100%; aspect-ratio: 3/4; overflow: hidden; background-color: #E8E6E3; position: relative; }
        .image-wrapper img { width: 100%; height: 100%; object-fit: cover; transition: transform 1.5s ease; }
        .image-wrapper:hover img { transform: scale(1.03); }

        .text-content { padding-right: 5vw; }
        .text-content .label { font-size: 16px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); display: block; margin-bottom: 16px; }
        .text-content h2 { font-size: 42px; font-weight: 700; line-height: 1.3; letter-spacing: -0.02em; margin-bottom: 32px; }
        .text-content p { font-size: 16px; font-weight: 400; line-height: 1.8; color: #4A4A4A; word-break: keep-all; }
        .text-content .serif-accent { font-family: var(--font-serif); font-weight: 500; font-style: italic; display: block; margin-top: 40px; font-size: 22px; color: var(--accent-amber); }

        /* 5. Reveal Animation */
        .scent-reveal {
            opacity: 0; filter: blur(15px); transform: translateY(30px);
            transition: opacity 1.4s cubic-bezier(0.2, 0.8, 0.2, 1), filter 1.4s cubic-bezier(0.2, 0.8, 0.2, 1), transform 1.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            will-change: transform, opacity, filter;
        }
        .scent-reveal.is-visible { opacity: 1; filter: blur(0); transform: translateY(0); }

        @media (max-width: 768px) {
            .hero-title { font-size: 52px; }
            .section-minimal { grid-template-columns: 1fr; gap: 60px; }
            .text-content { padding: 0; }
            .cursor-glow { display: none; }
            * { cursor: auto !important; }
        }
    </style>
</head>
<body>

    <div class="cursor-glow" id="cursorGlow"></div>

    <nav id="navbar">
        <div class="nav-logo">AIDORA</div>
        <div class="nav-menu">
            <span class="nav-menu-text">MENU</span>
            <span class="nav-menu-line"></span>
        </div>
    </nav>

    <main>
        <header class="hero-signature">
            <div class="hero-visual scent-reveal">
                <img src="https://images.unsplash.com/photo-1616949755610-8c9bbc08f138?q=80&w=1000&auto=format&fit=crop" alt="VOID 16:00 Signature">
            </div>
            
            <div class="hero-label scent-reveal" style="transition-delay: 0.1s;">Unseen Presence</div>
            
            <h1 class="hero-title scent-reveal" style="transition-delay: 0.2s;">
                <span class="line-1">VOID</span>
                <span class="line-2">16:00</span>
            </h1>
            
            <p class="hero-desc scent-reveal" style="transition-delay: 0.3s;">
                말하지 않아도 전해지는, 당신과 나 사이의 공백.<br>
                조용히 곁에 머물며 당신만의 아우라가 되는 향.
            </p>
        </header>

        <section class="section-minimal">
            <div class="image-wrapper scent-reveal">
                <img src="https://images.unsplash.com/photo-1592945403244-b3fbafd7f539?q=80&w=1000&auto=format&fit=crop" alt="Perfume Story">
            </div>
            
            <div class="text-content">
                <span class="label scent-reveal">VOID 16:00</span>
                <h2 class="scent-reveal" style="transition-delay: 0.1s;">오후 4시, 빛의 여백</h2>
                <p class="scent-reveal" style="transition-delay: 0.2s;">
                    서늘한 공기 사이로 비스듬히 떨어지는 오후의 볕.<br>
                    그 고요하고 나른한 찰나의 온도를 부드러운 잔향으로 엮어냈습니다.
                </p>
                <span class="serif-accent scent-reveal" style="transition-delay: 0.3s;">A quiet space left just for you.</span>
            </div>
        </section>
    </main>

    <script>
        /* 1. Cursor & Haptics */
        const cursorGlow = document.getElementById('cursorGlow');
        const isMobile = window.innerWidth <= 768;
        if (!isMobile) {
            let mouseX = window.innerWidth/2, mouseY = window.innerHeight/2, glowX = mouseX, glowY = mouseY;
            document.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });
            function animateCursor() {
                glowX += (mouseX - glowX) * 0.1; glowY += (mouseY - glowY) * 0.1;
                cursorGlow.style.left = glowX + 'px'; cursorGlow.style.top = glowY + 'px';
                requestAnimationFrame(animateCursor);
            }
            animateCursor();
        }
        document.addEventListener('click', () => { if(isMobile && navigator.vibrate) navigator.vibrate(10); });

        /* 2. Nav Scroll (애니메이션 원복) */
        const navbar = document.getElementById('navbar');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) navbar.classList.add('scrolled');
            else navbar.classList.remove('scrolled');
        });

        /* 3. Reveal Animation */
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('is-visible'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.scent-reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
